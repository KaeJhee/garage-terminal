name: Weekly Price Update

# ============================================================
# SCHEDULE: Runs every Sunday at midnight UTC
# Trigger manually from the Actions tab via "Run workflow"
# ============================================================
on:
  schedule:
    - cron: '0 0 * * 0'   # Sunday 00:00 UTC
  workflow_dispatch:        # Manual trigger - useful for testing

permissions:
  contents: write   # Needed to commit and push data.js + config + price_history

# ============================================================
# SECRETS (repo -> Settings -> Secrets):
#   GH_PAT             - Personal Access Token (Contents: read/write)
#   NETLIFY_HOOK_URL   - Netlify Build Hook URL (optional)
#   VERCEL_DEPLOY_HOOK - Vercel Deploy Hook URL (optional)
# ============================================================

jobs:
  update-prices:
    name: Scrape Prices & Regenerate History
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      # Scrape sold-only median prices (reads cars.config.js automatically)
      - name: Scrape latest prices
        run: python scraper/scrape_prices.py
        env:
          SCRAPE_DELAY_SEC: '3'

      # Append real sales to price_history.json, rebuild data.js, patch config
      - name: Regenerate price history
        run: python scraper/generate_history.py

      # Commit. IMPORTANT: price_history.json is the persistent sales store and
      # MUST be committed, or every weekly run starts from an empty history.
      # scraped_prices.json is gitignored (regenerated each run), so it is not staged.
      - name: Commit updated files
        run: |
          git config user.name  "garage-terminal-bot"
          git config user.email "bot@ghoststrategies.io"
          git add frontend/data.js frontend/cars.config.js frontend/price_history.json
          git diff --staged --quiet || git commit -m "chore: weekly price update $(date -u +'%Y-%m-%d')"

      - name: Push changes
        run: git push

      - name: Trigger Netlify redeploy
        if: success()
        run: |
          if [ -n "${{ secrets.NETLIFY_HOOK_URL }}" ]; then
            curl -s -X POST -H "Content-Type: application/json" "${{ secrets.NETLIFY_HOOK_URL }}" && echo "Netlify triggered"
          else
            echo "NETLIFY_HOOK_URL not set - skipping Netlify."
          fi

      - name: Trigger Vercel redeploy
        if: success()
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" && echo "Vercel triggered"
          else
            echo "VERCEL_DEPLOY_HOOK not set - Vercel auto-deploys on push."
          fi

      - name: Print summary
        run: |
          echo "### Price Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "Updated: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f scraper/scraped_prices.json ]; then
            python3 -c "import json;d=json.load(open('scraper/scraped_prices.json'));print(f\"- Total: {d.get('total_cars','?')}  Scraped: {d.get('scraped','?')}  Fallback: {d.get('fallback','?')}\")" >> $GITHUB_STEP_SUMMARY
          fi
