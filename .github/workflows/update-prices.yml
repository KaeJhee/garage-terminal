name: Weekly Price Update

# ============================================================
# SCHEDULE: Runs every Sunday at midnight UTC
# Trigger manually from the Actions tab via "Run workflow"
# ============================================================
on:
  schedule:
    - cron: '0 0 * * 0'   # Sunday 00:00 UTC = Saturday 7pm CDT (summer)
  workflow_dispatch:        # Manual trigger - useful for testing

# ============================================================
# PERMISSIONS
# ============================================================
permissions:
  contents: write   # Needed to commit and push data.js + config changes

# ============================================================
# SECRETS REQUIRED (set in GitHub repo -> Settings -> Secrets)
# ------------------------------------------------------------
# GH_PAT               - Personal Access Token (Contents: read/write)
#
# NETLIFY_HOOK_URL     - Netlify Build Hook URL (optional)
#                        Netlify -> Site -> Site configuration ->
#                        Build & deploy -> Build hooks -> Add build hook
#
# VERCEL_DEPLOY_HOOK   - Vercel Deploy Hook URL (optional)
#                        Vercel -> Project -> Settings -> Git ->
#                        Deploy Hooks -> Create Hook
#
# At least one of NETLIFY_HOOK_URL / VERCEL_DEPLOY_HOOK should be set.
# Both hooks fire if both are configured.
# ============================================================

jobs:
  update-prices:
    name: Scrape Prices & Regenerate History
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # 2. Set up Python (for scrape_prices.py + generate_history.py)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # 3. Set up Node.js (used by the scrapers to parse cars.config.js)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      # 5. Run the price scraper - reads cars.config.js automatically
      - name: Scrape latest prices
        run: python scraper/scrape_prices.py
        env:
          SCRAPE_DELAY_SEC: '3'   # polite delay between requests

      # 6. Regenerate data.js + patch cars.config.js
      - name: Regenerate price history
        run: python scraper/generate_history.py

      # 7. Commit and push changes
      - name: Commit updated files
        run: |
          git config user.name  "garage-terminal-bot"
          git config user.email "bot@ghoststrategies.io"
          git add frontend/data.js frontend/cars.config.js scraper/scraped_prices.json
          git diff --staged --quiet || git commit -m "chore: weekly price update $(date -u +'%Y-%m-%d')"

      - name: Push changes
        run: git push

      # 8. Trigger Netlify redeploy (if configured)
      - name: Trigger Netlify redeploy
        if: success()
        run: |
          if [ -n "${{ secrets.NETLIFY_HOOK_URL }}" ]; then
            echo "Triggering Netlify build hook..."
            HTTP_STATUS=$(curl -s -o /tmp/netlify_response.json -w "%{http_code}" \
              -X POST -H "Content-Type: application/json" \
              "${{ secrets.NETLIFY_HOOK_URL }}")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
              echo "Netlify build triggered successfully (HTTP $HTTP_STATUS)"
            else
              echo "Warning: Netlify hook returned HTTP $HTTP_STATUS"
              cat /tmp/netlify_response.json
            fi
          else
            echo "NETLIFY_HOOK_URL not set - skipping Netlify."
          fi

      # 9. Trigger Vercel redeploy (if configured)
      - name: Trigger Vercel redeploy
        if: success()
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "Triggering Vercel deploy hook..."
            HTTP_STATUS=$(curl -s -o /tmp/vercel_response.json -w "%{http_code}" \
              -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
              echo "Vercel deploy triggered successfully (HTTP $HTTP_STATUS)"
            else
              echo "Warning: Vercel hook returned HTTP $HTTP_STATUS"
              cat /tmp/vercel_response.json
            fi
          else
            echo "VERCEL_DEPLOY_HOOK not set - skipping Vercel."
            echo "(Vercel auto-deploys on git push by default, so this is usually optional.)"
          fi

      # 10. Summary
      - name: Print summary
        run: |
          echo "### Price Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "Updated: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f scraper/scraped_prices.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Cars updated:**" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          data = json.load(open('scraper/scraped_prices.json'))
          print(f\"- Total: {data.get('total_cars', '?')}\")
          print(f\"- Scraped: {data.get('scraped', '?')}\")
          print(f\"- Fallback: {data.get('fallback', '?')}\")
          " >> $GITHUB_STEP_SUMMARY
          fi
